<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDEVidencija - Evidencija dostave</title>
    <script>
        // GitHub Pages SPA redirect hack
        // This script takes the current path and redirects to the root with the path as a query parameter
        const path = window.location.pathname.replace('/bde-evidencija', '');
        const redirectPath = '/bde-evidencija/' + (path === '/' ? '' : '?p=' + path);
        window.location.replace(redirectPath);
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>

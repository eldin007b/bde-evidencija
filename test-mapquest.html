<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapQuest Test</title>
</head>
<body>
    <h1>MapQuest API Test</h1>
    <div id="status">Testing...</div>
    <div id="results"></div>

    <script>
        // Test ENV configuration
        console.log('🔧 Environment Test:', {
            hasViteMapQuestKey: !!import.meta.env.VITE_MAPQUEST_API_KEY,
            hasViteSupabaseUrl: !!import.meta.env.VITE_SUPABASE_URL,
            hasViteApiBaseUrl: !!import.meta.env.VITE_API_BASE_URL,
            finalMapQuestKey: import.meta.env.VITE_MAPQUEST_API_KEY ? `${import.meta.env.VITE_MAPQUEST_API_KEY.substring(0, 8)}...` : 'undefined',
            apiBaseUrl: import.meta.env.VITE_API_BASE_URL || 'https://dsltpiupbfopyvuiqffg.functions.supabase.co',
            supabaseUrl: import.meta.env.VITE_SUPABASE_URL || 'https://dsltpiupbfopyvuiqffg.supabase.co'
        });

        const status = document.getElementById('status');
        const results = document.getElementById('results');

        async function testMapQuest() {
            try {
                status.textContent = 'Testing Supabase proxy...';
                
                const API_BASE_URL = import.meta.env.VITE_API_BASE_URL || 'https://dsltpiupbfopyvuiqffg.functions.supabase.co';
                
                const requestBody = {
                    locations: [
                        { latLng: { lat: 43.8563, lng: 18.4131 } }, // Sarajevo
                        { latLng: { lat: 43.3209, lng: 17.8081 } }  // Mostar
                    ],
                    options: {
                        routeType: 'fastest',
                        unit: 'k'
                    }
                };

                console.log('🌐 Testing MapQuest via Supabase proxy:', API_BASE_URL);
                console.log('📦 Request body:', requestBody);

                const response = await fetch(`${API_BASE_URL}/mapquest-proxy`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                console.log('📡 Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`MapQuest proxy error: ${response.status} - ${response.statusText}`);
                }

                const data = await response.json();
                console.log('✅ MapQuest proxy success:', data);

                status.textContent = 'Success!';
                results.innerHTML = `
                    <h3>Route Results:</h3>
                    <p><strong>Distance:</strong> ${data.route.distance} km</p>
                    <p><strong>Time:</strong> ${Math.round(data.route.time / 60)} minutes</p>
                    <p><strong>Status:</strong> ${data.info.statuscode === 0 ? 'OK' : 'Error'}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;

            } catch (error) {
                console.error('❌ MapQuest test failed:', error);
                status.textContent = 'Failed!';
                results.innerHTML = `
                    <h3>Error:</h3>
                    <p style="color: red;">${error.message}</p>
                    <p><strong>Check console for details.</strong></p>
                `;
            }
        }

        // Test direct API as fallback
        async function testDirectAPI() {
            try {
                status.textContent = 'Testing direct API...';
                
                const apiKey = import.meta.env.VITE_MAPQUEST_API_KEY || 'HFcTXnwL6PW3Snh7rVohjnYopqvPhCL5';
                
                const requestBody = {
                    locations: [
                        { latLng: { lat: 43.8563, lng: 18.4131 } }, // Sarajevo
                        { latLng: { lat: 43.3209, lng: 17.8081 } }  // Mostar
                    ],
                    options: {
                        routeType: 'fastest',
                        unit: 'k'
                    }
                };

                console.log('🔧 Testing MapQuest direct API with key:', apiKey.substring(0, 8) + '...');

                const response = await fetch(`https://www.mapquestapi.com/directions/v2/route?key=${encodeURIComponent(apiKey)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                console.log('📡 Direct API Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`Direct API error: ${response.status} - ${response.statusText}`);
                }

                const data = await response.json();
                console.log('✅ Direct API success:', data);

                results.innerHTML += `
                    <h3>Direct API Results:</h3>
                    <p><strong>Distance:</strong> ${data.route.distance} km</p>
                    <p><strong>Time:</strong> ${Math.round(data.route.time / 60)} minutes</p>
                    <p><strong>Status:</strong> ${data.info.statuscode === 0 ? 'OK' : 'Error'}</p>
                `;

            } catch (error) {
                console.error('❌ Direct API test failed:', error);
                results.innerHTML += `
                    <h3>Direct API Error:</h3>
                    <p style="color: red;">${error.message}</p>
                `;
            }
        }

        // Run tests
        testMapQuest().then(() => {
            return testDirectAPI();
        });
    </script>
</body>
</html>
